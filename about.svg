  <!-- top line -->
  <line x1="120" y1="40" x2="580" y2="40" stroke="#ccc" stroke-width="0.4"/>

  <!-- top-right corner accent -->
  <line x1="680" y1="20" x2="700" y2="20" stroke="#ddd" stroke-width="0.5"/>
  <line x1="700" y1="20" x2="700" y2="44" stroke="#ddd" stroke-width="0.5"/>

