  <text x="350" y="128" text-anchor="middle" font-family="Noto Serif SC,STSong,SimSun,PingFang SC,serif" font-size="21" fill="#222" font-weight="bold" letter-spacing="12">代码是唯一的罗盘</text>

  <!-- center divider -->
  <line x1="290" y1="154" x2="410" y2="154" stroke="#bbb" stroke-width="0.5"/>

  <!-- body centered -->
  <text x="350" y="196" text-anchor="middle" font-family="PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif" font-size="16" fill="#999" letter-spacing="10">在混沌中寻找秩序</text>
  <text x="350" y="228" text-anchor="middle" font-family="PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif" font-size="16" fill="#999" letter-spacing="10">在黑暗中点燃微光</text>
  <text x="350" y="260" text-anchor="middle" font-family="PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif" font-size="16" fill="#999" letter-spacing="10">每一行代码都是对虚无的抵抗</text>

  <!-- bottom line -->
  <line x1="120" y1="290" x2="580" y2="290" stroke="#ccc" stroke-width="0.4"/>
